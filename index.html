<!DOCTYPE html>
<html>
<head>
<title>NUC Service Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<div id="loginBox">

<h1>NUC Service</h1>

<input type="password" id="password" placeholder="Admin Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>



<div id="app" style="display:none">


<div class="sidebar">

<h2>NUC</h2>

<button onclick="page('home')">🏠 Dashboard</button>
<button onclick="page('customer')">👥 Customer</button>
<button onclick="page('service')">🛠 Service</button>
<button onclick="page('payment')">💰 Payment</button>
<button onclick="logout()">🚪 Logout</button>

</div>



<div class="main">


<h1>NUC Service Dashboard</h1>


<div id="home" class="box">


<div class="cards">

<div class="card">
<h3>Total Customer</h3>
<h2 id="total">0</h2>
</div>


<div class="card">
<h3>Services</h3>
<h2>4</h2>
</div>


<div class="card">
<h3>Income</h3>
<h2>₹0</h2>
</div>


</div>

</div>



<div id="customer" class="box hide">


<h2>Add Customer</h2>


<input id="name" placeholder="Customer Name">

<input id="mobile" placeholder="Mobile">


<button onclick="addCustomer()">
Save Customer
</button>


<div id="customerList"></div>


</div>




<div id="service" class="box hide">

<h2>Services</h2>

<ul>
<li>LIC Service</li>
<li>Insurance</li>
<li>Online Work</li>
<li>Bill Payment</li>
</ul>


</div>




<div id="payment" class="box hide">

<h2>Payment Details</h2>

<p>No Payment Added</p>

</div>



</div>

</div>



<script src="script.js"></script>

</body>
</html>
