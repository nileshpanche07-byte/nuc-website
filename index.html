<!DOCTYPE html>
<html>
<head>

<title>NUC Life & Service</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- LOGIN -->

<div id="loginPage" class="login">

<h1>NUC Life & Service</h1>

<p>Admin Login</p>

<input 
type="password"
id="password"
placeholder="Enter Password">


<button onclick="login()">
Login
</button>

<p id="error"></p>

</div>





<!-- APP -->

<div id="app" class="hide">

<h1>NUC LIFE & SERVICE</h1>

<div class="card">
<h2>Admin Dashboard</h2>
<p>Welcome to NUC Service Panel</p>
</div>

<div class="menu">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('customer')">Customer</button>
<button onclick="showPage('service')">Service</button>
<button onclick="logout()">Logout</button>

</div>

<div class="sidebar">

<h2>NUC</h2>

<button onclick="showPage('dashboard')">
Dashboard
</button>


<button onclick="showPage('customers')">
Customers
</button>


<button onclick="logout()">
Logout
</button>


</div>





<div class="main">


<h1>
NUC Life & Service
</h1>



<div id="dashboard">


<div class="cards">


<div class="card">
<h3>Total Customer</h3>
<h2 id="total">0</h2>
</div>


<div class="card">
<h3>Pending</h3>
<h2 id="pending">0</h2>
</div>


<div class="card">
<h3>Complete</h3>
<h2 id="complete">0</h2>
</div>


<div class="card">
<h3>Income</h3>
<h2 id="income">₹0</h2>
</div>


</div>

</div>






<div id="customers" class="hide">


<div class="form">


<h2>Add Customer</h2>


<input id="name"
placeholder="Customer Name">


<input id="mobile"
placeholder="Mobile Number">


<select id="status">

<option>Pending</option>

<option>Complete</option>

</select>



<input id="amount"
placeholder="Amount">


<button onclick="addCustomer()">
Save Customer
</button>


</div>





<input 
id="search"
onkeyup="search()"
placeholder="Search Customer">



<div id="list">

</div>



</div>




</div>


</div>





<script src="script.js"></script>

</body>
</html>
